[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
port = 54328
file_size_limit = "50MiB"

[auth]
enabled = true
port = 54324
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
jwt_secret = "super-secret-jwt-token-with-at-least-32-characters-long"
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[realtime]
enabled = true
port = 54327

[functions]
enabled = true
port = 54329

[analytics]
enabled = true
port = 54330

[edge_functions]
enabled = true

[studio.public]
enabled = true

[studio.public.anon_key]
enabled = true

[studio.public.service_key]
enabled = true

[functions]
verify_jwt = true