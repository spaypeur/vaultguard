name: Deploy to Production

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Deploy to Vercel (Manual)
        run: |
          echo "🚀 Frontend deployment should be handled via Vercel's GitHub integration"
          echo "📝 Connect this repository to Vercel manually"
          echo "🔧 Configure environment variables in Vercel dashboard"
          echo "✅ Build completed successfully - ready for deployment"

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Build backend
        run: cd backend && npm run build

      - name: Deploy to Railway (Manual)
        run: |
          echo "🚀 Backend deployment should be handled via Railway's GitHub integration"
          echo "📝 Make sure your Railway project is connected to this GitHub repository"
          echo "🔧 Set up environment variables in Railway dashboard"
          echo "✅ Build completed successfully - ready for deployment"

  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run security audit
        run: |
          npm audit --audit-level=high
          if [ $? -eq 0 ]; then
            echo "✅ No high-severity vulnerabilities found"
          else
            echo "❌ High-severity vulnerabilities found"
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Clear npm cache
        run: npm cache clean --force

      - name: Install dependencies
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: Clear TypeScript and Jest cache
        run: |
          cd backend && rm -f tsconfig.tsbuildinfo && npx jest --clearCache || true
          cd ../frontend && rm -f tsconfig.tsbuildinfo && npx jest --clearCache || true

      - name: Run backend tests
        run: cd backend && npm test

      - name: Run frontend tests
        run: cd frontend && npm test