apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vaultguard-ingress
  namespace: vaultguard
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Strict-Transport-Security: max-age=31536000; includeSubDomains; preload";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";
      more_set_headers "Content-Security-Policy: default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.vaultguard.app https://api.vaultguard.io wss://api.vaultguard.app wss://api.vaultguard.io";
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - vaultguard.app
    - api.vaultguard.app
    - www.vaultguard.app
    - vaultguard.io
    - api.vaultguard.io
    - www.vaultguard.io
    secretName: vaultguard-tls
  rules:
  - host: vaultguard.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vaultguard-frontend
            port:
              number: 80
  - host: api.vaultguard.app
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: vaultguard-backend
            port:
              number: 3001