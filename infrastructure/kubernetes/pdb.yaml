apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vaultguard-backend-pdb
  namespace: vaultguard
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: vaultguard-backend

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: vaultguard-frontend-pdb
  namespace: vaultguard
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: vaultguard-frontend